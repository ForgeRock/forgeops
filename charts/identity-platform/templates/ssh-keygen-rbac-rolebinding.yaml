{{- if eq (include "ssh_keygen.enabled" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ssh-keygen
subjects:
  - kind: ServiceAccount
    name: ssh-keygen
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "ssh_keygen.clusterRoleName" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
