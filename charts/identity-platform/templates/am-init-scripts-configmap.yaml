{{- if .Values.am.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: am-init-scripts
  labels:
    {{- include "identity-platform.labels" . | nindent 4 }}
    {{- with .Values.am.podLabels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  {{ (.Files.Glob "files/am/init-scripts/**.sh").AsConfig | nindent 2 }}
{{- end }}
