---
# Source: identity-platform/templates/admin-ui-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-ui
  labels:
    helm.sh/chart: identity-platform-1.0.0
    app.kubernetes.io/name: identity-platform
    app.kubernetes.io/part-of: identity-platform
    app.kubernetes.io/instance: identity-platform
    app.kubernetes.io/version: 1.0.0
    app.kubernetes.io/managed-by: Helm
    app: admin-ui
    app.kubernetes.io/component: admin-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-platform
      app.kubernetes.io/part-of: identity-platform
      app.kubernetes.io/instance: identity-platform
      app: admin-ui
      app.kubernetes.io/component: admin-ui
  template:
    metadata:
      annotations:
      labels:
        app.kubernetes.io/name: identity-platform
        app.kubernetes.io/part-of: identity-platform
        app.kubernetes.io/instance: identity-platform
        app: admin-ui
        app.kubernetes.io/component: admin-ui
    spec:
      serviceAccountName: default
      securityContext: {}
      volumes:
        - name: admin-ui-init-scripts
          configMap:
            name: admin-ui-init-scripts
            defaultMode: 0755
        - name: writeable
          emptyDir: {}
      initContainers:
        - name: filesystem-init
          image: admin-ui
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /scripts
              name: admin-ui-init-scripts
            - mountPath: /writeable
              name: writeable
          command:
            - /scripts/filesystem-init.sh
      containers:
        - name: admin-ui
          securityContext: {}
          image: admin-ui
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command:
                  - /usr/bin/nginx
                  - -s
                  - quit
          env:
            - name: SUBFOLDER
              value: platform
            - name: ROUTES_FILE
              value: routes.platform
          envFrom:
            - configMapRef:
                name: platform-config
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            exec:
              command:
                - "true"
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
          resources:
            limits:
              memory: 100Mi
            requests:
              cpu: 10m
              memory: 100Mi
          volumeMounts:
            - mountPath: /tmp
              name: writeable
              subPath: tmp
            - mountPath: /usr/share/nginx
              name: writeable
              subPath: usr/share/nginx
      tolerations:
        - effect: NoSchedule
          key: kubernetes.io/arch
          operator: Exists
